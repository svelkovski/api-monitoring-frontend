<div class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div
    class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 w-full max-w-md"
  >
    <div class="mb-8">
      <h1 class="text-2xl font-semibold text-gray-900">Welcome back</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to your account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Username</label
        >
        <input
          formControlName="username"
          type="text"
          placeholder="your username"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition"
        />
        @if (usernameIsInvalid) {
          <p class="text-red-500 text-xs mt-1">Username is required</p>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Password</label
        >
        <input
          formControlName="password"
          type="password"
          placeholder="••••••••"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition"
        />
        @if (passwordIsInvalid) {
          <p class="text-red-500 text-xs mt-1">Password is required</p>
        }
      </div>

      @if (error) {
        <p class="text-red-500 text-sm">{{ error }}</p>
      }

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-gray-900 text-white py-2 rounded-lg text-sm font-medium hover:bg-gray-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ loading ? "Signing in..." : "Sign in" }}
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account?
      <a
        routerLink="/register"
        class="text-gray-900 font-medium hover:underline"
        >Sign up</a
      >
    </p>
  </div>
</div>
