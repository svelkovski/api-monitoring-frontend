<div class="flex h-screen bg-gray-50">
  <aside class="w-48 bg-white border-r border-gray-200 flex flex-col">
    <div class="px-4 py-5 border-b border-gray-200">
      <p class="text-sm font-medium text-gray-900">API Monitor</p>
      <p class="text-xs text-gray-400 mt-0.5">{{ username }}</p>
    </div>
    <nav class="flex-1 py-3">
      <a
        routerLink="/dashboard"
        class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-900 bg-gray-50"
      >
        <span class="w-1.5 h-1.5 rounded-full bg-gray-900"></span>
        Dashboard
      </a>
    </nav>
    <div class="px-4 py-4 border-t border-gray-200">
      <button
        (click)="logout()"
        class="text-xs text-gray-400 hover:text-gray-900 transition"
      >
        Sign out
      </button>
    </div>
  </aside>
</div>
