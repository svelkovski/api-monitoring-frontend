<div class="grid grid-cols-3 gap-2.5 mb-5">
  <div class="bg-white border border-gray-200 rounded-lg p-4">
    <p class="text-xs uppercase tracking-wide text-gray-400 font-medium">
      Uptime
    </p>
    <p class="text-2xl font-medium mt-1" [class]="uptimeColor">
      {{ uptimePercent }}%
    </p>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-4">
    <p class="text-xs uppercase tracking-wide text-gray-400 font-medium">
      Avg Response
    </p>
    <p class="text-2xl font-medium text-gray-900 mt-1">
      {{ avgResponseTime }}<span class="text-sm text-gray-400 ml-1">ms</span>
    </p>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-4">
    <p class="text-xs uppercase tracking-wide text-gray-400 font-medium">
      Incidents
    </p>
    <p
      class="text-2xl font-medium mt-1"
      [class]="downCount > 0 ? 'text-red-600' : 'text-gray-900'"
    >
      {{ downCount }}
    </p>
  </div>
</div>
